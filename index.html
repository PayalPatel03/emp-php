<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="./css/style.css">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div class="logo">
        <i class="fa fa-clipboard-check"></i> <span>My-Task</span>
    </div>

    <a class="active"><i class="fa fa-home"></i> <span>Dashboard</span></a>
    <a><i class="fa fa-briefcase"></i> <span>Projects</span></a>
    
    <a><i class="fa fa-user"></i> <span>Our Clients</span></a>
    <a><i class="fa fa-user"></i> <span>Our Clients</span></a>

    <div class="toggle-btn" onclick="toggleSidebar()">
        <i class="fa-solid fa-arrow-left-long" id="arrow"></i>
    </div>
</div>

<!-- Main -->
<div class="main" id="main">

    <!-- Topbar -->
    <div class="topbar">
        <input class="search-box" placeholder="Search">

        <div class="profile">
            <i class="fa fa-bell ms-3"></i>
            <i class="fa-solid fa-circle-user"></i>
            <div>
                <div style="font-size:10px;font-weight:600;">XYZ</div>
                <div style="font-size:8px;color:gray;">Admin Profile</div>
            </div>
        </div>
    </div>

    <div class="row">

        <!-- Left Chart -->
        <div class="col-md-8">
            <div class="chart-box">
                <div class="title">Employees Info</div>
                <canvas id="lineChart"></canvas>
            </div>

            <div class="row mt-4">
                <div class="col-md-6">
                    <div class="card-box">
                        <div class="title">Employees Availability</div>
                        <div class="d-flex justify-content-between mt-3">
                            <div>
                                <i class="fa fa-check-square"></i>
                                <div>Attendance</div>
                            </div>
                            <div>
                                <i class="fa fa-clock"></i>
                                <div>Late Coming</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card-box">
                        <div class="d-flex justify-content-between">
                            <div class="title">Total Employees</div>
                            <b>423</b>
                        </div>
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Cards -->
        <div class="col-md-4">
            <div class="purple-card card-box mb-3">
                <div>
                    <h2>1546</h2>
                    <div>Applications</div>
                </div>
                <i class="fa fa-file fa-2x"></i>
            </div>

            <div class="small-card mb-3">
                <div class="circle">
                    <i class="fa fa-users"></i>
                </div>
                <div>
                    <h5>246</h5>
                    <small>Interviews</small>
                </div>
            </div>

            <div class="small-card">
                <div class="circle">
                    <i class="fa fa-handshake"></i>
                </div>
                <div>
                    <h5>101</h5>
                    <small>Hired</small>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="./javascript/script.js"></script>

</body>
</html>
